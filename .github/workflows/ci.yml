name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev deps)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src config tests
      - name: Format check (ruff)
        run: ruff format --check src config tests
      - name: Tests
        # Unit tests run everywhere; the data-quality suite auto-skips without the
        # (gitignored) staging data present.
        run: pytest tests/ -q
